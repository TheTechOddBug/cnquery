# Configuration for the `typos` spell checker (https://github.com/crate-ci/typos).
# Run locally with `typos` (and `typos --write-changes` to auto-fix).

[files]
extend-exclude = [
  # Generated code — owned by code generators, not hand-edited.
  "*.pb.go",
  "*.lr.go",
  "*.lr.versions",
  "*.ranger.go",
  "*.resources.json",
  "*.permissions.json",
  # Test fixtures and recordings often contain captured real-world data.
  "**/testdata/**",
  # Lockfiles and binary-ish assets.
  "go.sum",
  "*.svg",
]

# Words typos must not flag. Each maps to itself (i.e. "this spelling is fine").
# Three groups: real technical terms/abbreviations, a company name, and
# pre-existing misspellings that are baked into MQL schema field names or
# exported Go identifiers — renaming those is a breaking change, so they are
# baselined here and left for a separate, deliberate cleanup.
[default.extend-words]
# Technical terms, abbreviations, command names, and short identifier fragments.
# MikroTik RouterOS (and the go-routeros SDK package name).
routeros = "routeros"
aks = "aks"
nd = "nd"
hashi = "hashi"
udid = "udid"
writeable = "writeable"
unparseable = "unparseable"
unparented = "unparented"
signins = "signins"
copywrite = "copywrite"
exportfs = "exportfs"
xwindows = "xwindows"
snet = "snet"
aci = "aci"
afe = "afe"
ags = "ags"
anc = "anc"
aso = "aso"
ba = "ba"
caf = "caf"
cound = "cound"
cpy = "cpy"
daa = "daa"
ded = "ded"
dne = "dne"
ede = "ede"
ein = "ein"
fo = "fo"
gae = "gae"
hda = "hda"
hel = "hel"
hpe = "hpe"
inh = "inh"
ist = "ist"
mak = "mak"
mis = "mis"
ot = "ot"
pn = "pn"
sie = "sie"
sur = "sur"
thr = "thr"
tre = "tre"
ue = "ue"
# Company name.
automattic = "automattic"
# Misspelled JSON serialization tag kept for wire/persisted-data compatibility
# (the Go field itself is spelled correctly).
reciever = "reciever"
# Intentional values in test fixtures (character names, test input strings)
# that must stay verbatim.
yor = "yor"
yoman = "yoman"
# German word ("as") in a localized PowerShell error string used to test
# non-English Defender availability detection.
als = "als"
# Windows registry value name for the PowerShell transcription policy
# (HKLM\...\PowerShell\Transcription\EnableTranscripting). Microsoft's own
# spelling, so it must stay verbatim to match the real registry key.
transcripting = "transcripting"
# Alibaba Cloud Go SDK field spellings baked into exported identifiers
# (RouteEntrys, MaxLoginAttemps, IzNo, LoadBalancerBussinessStatus). These are
# the SDK's own spellings, so references to them cannot be renamed.
entrys = "entrys"
attemps = "attemps"
iz = "iz"
bussiness = "bussiness"
# Databricks Go SDK type name GetPrivateAccesRequest (missing the second "s").
# The SDK's own spelling, so references to it cannot be renamed.
acces = "acces"
# Pre-existing misspellings in MQL schema fields / exported Go identifiers.
# Renaming these would break the schema or API, so they are baselined.
appliable = "appliable"
applyable = "applyable"
setable = "setable"
valueable = "valueable"
accessable = "accessable"
policys = "policys"
inable = "inable"
compleated = "compleated"
deliminated = "deliminated"
datas = "datas"
childs = "childs"
setings = "setings"
softwares = "softwares"
splitted = "splitted"
