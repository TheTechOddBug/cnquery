#
# Coverage fixture: one instance of every modeled ingress vector, so the
# completeness test fails if any vector stops producing a network exposure.
# Vectors: Service LoadBalancer, Service NodePort, Service ClusterIP externalIPs,
# Ingress, Gateway, hostPort pod, hostNetwork pod. Includes a public node, a
# private node, and an unscheduled pod to exercise host-exposure classification.
---
apiVersion: v1
kind: Node
metadata:
  name: node-pub
status:
  addresses:
    - type: ExternalIP
      address: 8.8.8.8
    - type: InternalIP
      address: 10.0.0.5
---
apiVersion: v1
kind: Node
metadata:
  name: node-priv
status:
  addresses:
    - type: InternalIP
      address: 10.0.0.6
---
apiVersion: v1
kind: Namespace
metadata:
  name: prod
---
# Vector: Service type LoadBalancer with a public address.
apiVersion: v1
kind: Service
metadata:
  name: lb-svc
  namespace: prod
spec:
  type: LoadBalancer
  selector:
    app: lb
  ports:
    - port: 80
status:
  loadBalancer:
    ingress:
      - ip: 8.8.4.4
---
# Vector: Service type NodePort.
apiVersion: v1
kind: Service
metadata:
  name: np-svc
  namespace: prod
spec:
  type: NodePort
  selector:
    app: np
  ports:
    - port: 80
      nodePort: 30080
---
# Vector: ClusterIP service with an external IP.
apiVersion: v1
kind: Service
metadata:
  name: eip-svc
  namespace: prod
spec:
  type: ClusterIP
  selector:
    app: eip
  externalIPs:
    - 1.1.1.1
  ports:
    - port: 80
---
# Vector: Ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ing
  namespace: prod
spec:
  rules:
    - host: example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eip-svc
                port:
                  number: 80
status:
  loadBalancer:
    ingress:
      - hostname: lb.example.com
---
# Vector: Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: istio
spec:
  controllerName: istio.io/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw
  namespace: prod
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 80
status:
  addresses:
    - type: IPAddress
      value: 1.0.0.1
---
# Vector: hostPort container on a public node -> internet-exposed.
apiVersion: v1
kind: Pod
metadata:
  name: hostport-pub
  namespace: prod
spec:
  nodeName: node-pub
  containers:
    - name: app
      image: nginx:1.27
      ports:
        - containerPort: 8080
          hostPort: 8080
          protocol: TCP
status:
  phase: Running
  hostIP: 10.0.0.5
---
# Vector: hostNetwork pod on a public node -> every containerPort is a node port.
apiVersion: v1
kind: Pod
metadata:
  name: hostnet-pub
  namespace: prod
spec:
  nodeName: node-pub
  hostNetwork: true
  containers:
    - name: agent
      image: agent:1.0
      ports:
        - containerPort: 9090
status:
  phase: Running
  hostIP: 8.8.8.8
---
# hostPort on a private node -> not internet-exposed.
apiVersion: v1
kind: Pod
metadata:
  name: hostport-priv
  namespace: prod
spec:
  nodeName: node-priv
  containers:
    - name: app
      image: nginx:1.27
      ports:
        - containerPort: 8081
          hostPort: 8081
status:
  phase: Running
  hostIP: 10.0.0.6
---
# hostPort on an unscheduled pod -> node unknown.
apiVersion: v1
kind: Pod
metadata:
  name: hostport-unsched
  namespace: prod
spec:
  containers:
    - name: app
      image: nginx:1.27
      ports:
        - containerPort: 8082
          hostPort: 8082
status:
  phase: Pending
---
# Ordinary pod -> no host exposure, NetworkPolicy applies.
apiVersion: v1
kind: Pod
metadata:
  name: normal
  namespace: prod
  labels:
    app: lb
spec:
  nodeName: node-pub
  containers:
    - name: app
      image: nginx:1.27
      ports:
        - containerPort: 80
status:
  phase: Running
  hostIP: 10.0.0.5
