#
# Exercises the typed policy-rule view and the derived RBAC predicates.
---
# cluster-admin style: wildcard verbs/groups/resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wildcard-admin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
# Reads secrets in the core group.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
# Can escalate via the rbac "escalate" verb, and impersonate.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: escalator
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    verbs: ["escalate", "get"]
  - apiGroups: [""]
    resources: ["users", "groups", "serviceaccounts"]
    verbs: ["impersonate"]
---
# Benign read-only role over configmaps in one namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configmap-reader
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
    resourceNames: ["app-config"]
---
# Namespaced role that can bind roles (privilege escalation).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: binder
  namespace: default
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles"]
    verbs: ["bind", "create"]
---
# Service accounts used as binding subjects.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-sa
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reader-sa
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-sa
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: binder-sa
  namespace: default
---
# Cluster-admin binding: grants wildcard-admin cluster-wide to admin-sa.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wildcard-admin
subjects:
  - kind: ServiceAccount
    name: admin-sa
    namespace: default
---
# Benign: binds the read-only configmap-reader Role to reader-sa.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: reader-binding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: configmap-reader
subjects:
  - kind: ServiceAccount
    name: reader-sa
    namespace: default
---
# RoleBinding that references a ClusterRole (secret-reader) in one namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-binding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secret-reader
subjects:
  - kind: ServiceAccount
    name: secret-sa
    namespace: default
---
# Binds the privilege-escalating binder Role to binder-sa.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: binder-binding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: binder
subjects:
  - kind: ServiceAccount
    name: binder-sa
    namespace: default
