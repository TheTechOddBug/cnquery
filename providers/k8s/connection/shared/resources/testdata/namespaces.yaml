#
# Exercises ManifestParser.Namespaces():
#   - "secured" and "privileged-ns" are standalone Namespace objects and must
#     be returned with their full metadata (labels, annotations, uid).
#   - "referenced-only" has no Namespace object; it is only referenced by the
#     ConfigMap below and must be synthesized as a minimal Namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: secured
  uid: 11111111-1111-1111-1111-111111111111
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.30
    pod-security.kubernetes.io/warn: baseline
  annotations:
    owner: platform-team
---
apiVersion: v1
kind: Namespace
metadata:
  name: privileged-ns
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: referenced-only
data:
  key: value
