policies:
  - uid: proxmox-security
    name: Proxmox VE Security Policy
    version: "2.0.0"
    authors:
      - name: Mondoo
    tags:
      mondoo.com/platform: proxmox
      mondoo.com/category: security
    require:
      - provider: proxmox
    groups:
      - title: Cluster Health
        filters: |
          proxmox.nodes != null
        checks:
          - uid: proxmox-all-nodes-online
          - uid: proxmox-cluster-quorate

      - title: VM Availability
        filters: |
          proxmox.vms != null
        checks:
          - uid: proxmox-no-stopped-vms
          - uid: proxmox-no-paused-vms

      - title: VM Configuration
        filters: |
          proxmox.vms != null
        checks:
          - uid: proxmox-vms-have-memory-limit
          - uid: proxmox-vms-have-cpu-limit
          - uid: proxmox-no-unnamed-vms
          - uid: proxmox-vms-guest-agent-enabled
          - uid: proxmox-vms-use-virtio-network
          - uid: proxmox-vms-not-using-seabios

      - title: Patch Management - VMs
        filters: |
          proxmox.vms != null
        checks:
          - uid: proxmox-no-vms-with-security-updates
          - uid: proxmox-no-vms-with-pending-updates

      - title: Patch Management - Nodes
        filters: |
          proxmox.nodes != null
        checks:
          - uid: proxmox-no-nodes-with-pending-updates

      - title: Network Security
        filters: |
          proxmox.nodes != null
        checks:
          - uid: proxmox-vm-firewall-enabled

      - title: Certificate Management
        filters: |
          proxmox.nodes != null
        checks:
          - uid: proxmox-no-self-signed-certs
          - uid: proxmox-cert-key-size

      - title: Access Control
        filters: |
          proxmox.users != null
        checks:
          - uid: proxmox-no-expired-users
          - uid: proxmox-tokens-have-expiry
          - uid: proxmox-tokens-use-privsep

      - title: Subscription & Support
        filters: |
          proxmox.nodes != null
        checks:
          - uid: proxmox-subscription-active

      - title: Storage Health
        filters: |
          proxmox.storages != null
        checks:
          - uid: proxmox-storage-not-full

queries:
  # --- Cluster Health ---
  - uid: proxmox-all-nodes-online
    title: All Proxmox nodes are online
    impact: 90
    mql: |
      proxmox.nodes.all(status == "online")
    docs:
      desc: |
        Offline nodes may indicate hardware or network problems
        and affect VM availability in the cluster.
      remediation: |
        Check the affected node for hardware and network issues.

  - uid: proxmox-cluster-quorate
    title: Cluster has quorum
    impact: 95
    mql: |
      proxmox.cluster.quorate == true
    docs:
      desc: |
        A cluster without quorum cannot safely manage HA resources.
        VMs may fail to migrate or restart on node failure.
      remediation: |
        Ensure the majority of cluster nodes are online and corosync
        communication is working.

  # --- VM Availability ---
  - uid: proxmox-no-stopped-vms
    title: No VMs in "stopped" state (except templates)
    impact: 40
    mql: |
      proxmox.vms.where(template == false).all(status != "stopped")
    docs:
      desc: |
        Stopped VMs may indicate problems or cause unused resource
        consumption in the inventory.
      remediation: |
        Restart the VM or remove it if it is no longer needed.

  - uid: proxmox-no-paused-vms
    title: No VMs in "paused" state
    impact: 60
    mql: |
      proxmox.vms.all(status != "paused")
    docs:
      desc: |
        Paused VMs block resources and may indicate an aborted
        migration or an error condition.
      remediation: |
        Resume the VM or restore it from a known good state.

  # --- VM Configuration ---
  - uid: proxmox-vms-have-memory-limit
    title: All VMs have at least 512 MB RAM configured
    impact: 30
    mql: |
      proxmox.vms.where(template == false).all(maxmem >= 536870912)
    docs:
      desc: |
        VMs with less than 512 MB RAM may run unstable and indicate
        a misconfiguration.
      remediation: |
        Increase the RAM of the affected VM to at least 512 MB.

  - uid: proxmox-vms-have-cpu-limit
    title: All VMs have at least 1 vCPU configured
    impact: 30
    mql: |
      proxmox.vms.where(template == false).all(maxcpu >= 1)
    docs:
      desc: |
        VMs without an assigned vCPU cannot start and indicate
        a misconfiguration.
      remediation: |
        Assign at least 1 vCPU to the VM.

  - uid: proxmox-no-unnamed-vms
    title: All VMs have a name
    impact: 20
    mql: |
      proxmox.vms.all(name != "")
    docs:
      desc: |
        VMs without a name are hard to identify and indicate
        an incomplete configuration.
      remediation: |
        Assign a meaningful name to the VM in Proxmox.

  - uid: proxmox-vms-guest-agent-enabled
    title: All running VMs have the QEMU guest agent enabled
    impact: 50
    mql: |
      proxmox.vms.where(status == "running" && template == false).all(agent == true)
    docs:
      desc: |
        The QEMU guest agent provides better shutdown behavior, filesystem
        freeze for consistent backups, and enables update monitoring.
      remediation: |
        Enable the QEMU guest agent in VM options and install
        qemu-guest-agent inside the VM.

  - uid: proxmox-vms-use-virtio-network
    title: All VMs use virtio network adapters
    impact: 20
    mql: |
      proxmox.vms.where(template == false).all(
        networks.all(model == "virtio")
      )
    docs:
      desc: |
        Virtio network adapters provide significantly better performance
        than emulated adapters (e1000, rtl8139).
      remediation: |
        Change the NIC model to virtio in the VM hardware settings.

  - uid: proxmox-vms-not-using-seabios
    title: All VMs use OVMF (UEFI) instead of SeaBIOS
    impact: 20
    mql: |
      proxmox.vms.where(template == false).all(bios != "seabios")
    docs:
      desc: |
        OVMF (UEFI) supports Secure Boot and provides better security
        than the legacy SeaBIOS firmware.
      remediation: |
        Recreate the VM with OVMF BIOS and enable Secure Boot.

  # --- Patch Management ---
  - uid: proxmox-no-vms-with-security-updates
    title: No running VMs with pending security updates
    impact: 80
    mql: |
      proxmox.vms.where(status == "running" && template == false).all(
        updates.where(upgradable == true && severity == "security").length == 0
      )
    docs:
      desc: |
        Running VMs with pending security updates are a direct
        security risk and may contain unpatched vulnerabilities.
      remediation: |
        Run an update on the affected VM:
        - Linux (apt): apt-get upgrade
        - Linux (dnf): dnf upgrade
        - Windows: run Windows Update

  - uid: proxmox-no-vms-with-pending-updates
    title: No running VMs with pending updates
    impact: 40
    mql: |
      proxmox.vms.where(status == "running" && template == false).all(
        updates.where(upgradable == true).length == 0
      )
    docs:
      desc: |
        Running VMs with pending updates may not be up to date
        and could have stability or security issues.
      remediation: |
        Run an update on the affected VM and ensure that
        automatic updates are configured.

  - uid: proxmox-no-nodes-with-pending-updates
    title: No Proxmox nodes with pending important updates
    impact: 70
    mql: |
      proxmox.nodes.all(
        updates.where(severity == "important").length == 0
      )
    docs:
      desc: |
        Proxmox nodes with pending important updates may have
        unpatched kernel or hypervisor vulnerabilities.
      remediation: |
        Run apt-get update && apt-get dist-upgrade on the node
        and schedule a reboot if kernel updates were installed.

  # --- Network Security ---
  - uid: proxmox-vm-firewall-enabled
    title: All VM network interfaces have firewall enabled
    impact: 60
    mql: |
      proxmox.vms.where(template == false && status == "running").all(
        networks.all(firewall == true)
      )
    docs:
      desc: |
        VM network interfaces without the Proxmox firewall enabled
        bypass all firewall rules and allow unrestricted traffic.
      remediation: |
        Enable the firewall option on each VM network interface.

  # --- Certificate Management ---
  - uid: proxmox-no-self-signed-certs
    title: No self-signed TLS certificates on nodes
    impact: 50
    mql: |
      proxmox.nodes.all(
        certificates.none(issuer == subject)
      )
    docs:
      desc: |
        Self-signed certificates do not provide chain-of-trust verification
        and force users to accept insecure connections.
      remediation: |
        Replace self-signed certificates with certificates from a trusted CA
        or deploy an internal PKI.

  - uid: proxmox-cert-key-size
    title: All TLS certificates use at least 2048-bit keys
    impact: 40
    mql: |
      proxmox.nodes.all(
        certificates.all(publicKeyBits >= 2048)
      )
    docs:
      desc: |
        Certificates with keys smaller than 2048 bits are considered
        cryptographically weak and may be vulnerable to brute-force attacks.
      remediation: |
        Regenerate the certificate with at least a 2048-bit RSA key
        or a 256-bit EC key.

  # --- Access Control ---
  - uid: proxmox-no-expired-users
    title: No user accounts with past expiration date
    impact: 40
    mql: |
      proxmox.users.where(expire > 0).all(expire > time.now.unix)
    docs:
      desc: |
        Expired user accounts should be cleaned up to reduce the
        attack surface and avoid confusion.
      remediation: |
        Remove or extend the expiration of affected user accounts.

  - uid: proxmox-tokens-have-expiry
    title: All API tokens have an expiration date
    impact: 60
    mql: |
      proxmox.users.all(
        tokens.all(expire > 0)
      )
    docs:
      desc: |
        API tokens without an expiration date remain valid indefinitely.
        If compromised, they provide permanent access.
      remediation: |
        Set an expiration date on all API tokens.

  - uid: proxmox-tokens-use-privsep
    title: All API tokens use privilege separation
    impact: 70
    mql: |
      proxmox.users.all(
        tokens.all(privsep == true)
      )
    docs:
      desc: |
        API tokens without privilege separation inherit the full
        permissions of the user, which violates least-privilege.
      remediation: |
        Enable privilege separation and assign only the required
        permissions to each token.

  # --- Subscription & Support ---
  - uid: proxmox-subscription-active
    title: All nodes have an active Proxmox subscription
    impact: 50
    mql: |
      proxmox.nodes.all(
        subscription.status == "active"
      )
    docs:
      desc: |
        Nodes without an active subscription do not receive stable
        update repositories and enterprise support.
      remediation: |
        Purchase and activate a Proxmox VE subscription for each node.

  # --- Storage Health ---
  - uid: proxmox-storage-not-full
    title: No storage pools above 90% usage
    impact: 70
    mql: |
      proxmox.storages.where(enabled == true).all(usagePercent < 90)
    docs:
      desc: |
        Storage pools above 90% usage may cause VM failures,
        failed backups, and performance degradation.
      remediation: |
        Free up space by removing old backups, unused ISOs, or
        expanding the storage pool.
