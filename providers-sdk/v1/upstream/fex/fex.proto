syntax = "proto3";

package mql.fex.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "go.mondoo.com/mql/v13/providers-sdk/v1/upstream/fex";

// The enum value names and field names below intentionally mirror the
// server-internal etl schema byte-for-byte so the proto-JSON upload contract
// stays compatible across systems. protolint's naming conventions are
// therefore disabled for this file.
// protolint:disable ENUM_FIELD_NAMES_UPPER_SNAKE_CASE
// protolint:disable ENUM_FIELD_NAMES_PREFIX
// protolint:disable ENUM_FIELD_NAMES_ZERO_VALUE_END_WITH
// protolint:disable REPEATED_FIELD_NAMES_PLURALIZED

// fex (Finding Exchange) publishes the public-facing contract for finding and
// vulnerability data structures. Query packs that read third-party sources
// (AWS Security Hub, Qualys, nuclei, ...) construct these documents and the
// MQL runtime records them for upload to Mondoo Platform. Field numbers are
// kept wire-compatible with the server-internal etl schema.

// FindingDocument is a wrapper message that can hold either a
// VulnerabilityExchange or a FindingExchange document.
message FindingDocument {
  oneof finding {
    VulnerabilityExchange vex = 1;
    FindingExchange fex = 2;
  }
}

// FindingsUploadRequest is the file format uploaded to the ingest bucket for
// findings uploads. It contains all findings along with metadata needed by
// the processor.
message FindingsUploadRequest {
  repeated FindingDocument findings = 1;
  string source = 2;
  bool mondoo_enrichment = 3;
  string space_mrn = 4;
  bool create_assets = 5;
  google.protobuf.Timestamp import_started_at = 6;
}

// VulnerabilityExchange are used for sharing information about vulnerabilities
// across systems. Mondoo uses this format as a main mean to store detected
// vulnerability information. The same document is generated independently from
// the source.
message VulnerabilityExchange {
  // field 14 (risk_factors) is reserved: the server schema carries a
  // cnspec-internal ScoredRiskFactors here, which is not part of the public
  // fex contract.
  reserved 14;

  // Optional. Externally provided ID from the original data source
  string ref = 1;
  // Required. CVE or Advisory ID
  string id = 2;
  // Optional. Mondoo Resource Name (MRN)
  string mrn = 3;
  // Required. Summary of the vulnerability
  string summary = 4;
  // Optional. List of aliases for the vulnerability
  repeated string aliases = 5;
  // Optional. related vulnerabilities, e.g. CVE-2024-123456
  repeated string related = 16;
  // Optional. upstream vulnerabilities, e.g. CVE-2024-123456
  repeated string upstream = 18;
  // Optional. Detailed information about the vulnerability
  VulnerabilityDetails details = 6;
  // Required. Source of the vulnerability
  Source source = 7;
  // Optional. List of severities for the vulnerability
  // In OSV, this is called a Severity
  // TODO: switch to new Severity message
  repeated Rating ratings = 8;
  // Optional. Time the vulnerability was first seen
  google.protobuf.Timestamp first_seen = 9;
  // Optional. Time the vulnerability was remediated
  google.protobuf.Timestamp remediated = 10;
  // Required. List of affected components
  repeated Affects affects = 11;
  // Required. Status of the vulnerability
  Status status = 12;
  // Optional. List of references for the vulnerability
  repeated Reference references = 13;
  // Optional. List of available remediation
  repeated Remediation remediations = 15;
  // Optional. Database specific information
  // DatabaseSpecific holds additional information about the vulnerability as
  // defined by the database from which the record was obtained.
  // See https://ossf.github.io/osv-schema/#database_specific-field.
  google.protobuf.Struct database_specific = 17;

  // Optional. Technical evidence
  repeated Evidence evidences = 20;
}

// Reference is used to provide additional information about the vulnerability.
message Reference {
  // Optional. ID of the reference
  string id = 1;
  // Required. Name of the reference
  string name = 2;
  // Required. URL of the reference
  string url = 3;
  // Type of reference (e.g., "CVE", "CWE")
  string type = 4;
  // Additional reference metadata
  map<string, string> metadata = 5;
}

// Source is used to identify the source of the vulnerability.
message Source {
  // Required. Name of the source
  string name = 1;
  // Optional. URL of the source
  string url = 2;
}

// Status is used to identify the status of the vulnerability.
enum Status {
  // Unspecified status
  STATUS_UNSPECIFIED = 0;
  // Vulnerability is not affected
  STATUS_NOT_AFFECTED = 1;
  // Vulnerability is affected
  STATUS_AFFECTED = 2;
  // Vulnerability is fixed
  STATUS_FIXED = 3;
  // Vulnerability is under investigation
  STATUS_UNDER_INVESTIGATION = 4;
  // Not a real issue
  STATUS_FALSE_POSITIVE = 5;
  // Accepted risk
  STATUS_WONT_FIX = 6;
}

// VulnerabilityDetails are used to provide detailed information about the
// vulnerability.
message VulnerabilityDetails {
  // Optional. Description of the vulnerability
  string details = 1;
  // Optional. Recommendation for the vulnerability
  string recommendation = 2;
  // Optional. Workaround for the vulnerability
  string workaround = 3;
  // Time the vulnerability was created
  google.protobuf.Timestamp created = 9;
  // Time the vulnerability was published
  google.protobuf.Timestamp published = 10;
  // Time the vulnerability was last updated
  google.protobuf.Timestamp updated = 11;
}

// Affects is used to identify the affected components.
message Affects {
  // Required. Root component that is affected
  Component component = 1;
  // Optional. List of sub-components that are affected
  repeated Component sub_components = 2;
}

// Component is used to identify the affected component.
message Component {
  // Required. Name of the component
  string id = 1;
  // Required. Version of the component
  map<string, string> identifiers = 2;
  // Additional properties
  map<string, string> properties = 3;

  // Experimental. Component details based on type
  oneof details {
    FileComponent file = 21;
  }
}

// Experimental. File-specific component details
message FileComponent {
  // Path to the file
  string path = 1;

  // File hash for version tracking
  string hash = 2;

  // File format or type
  string format = 3;

  // File size in bytes
  int64 size = 4;
}

// Rating is used to provide a score for the vulnerability.
// Deprecated: use Severity instead
message Rating {
  // Required. Source of the rating
  Source source = 1;
  // Optional. Score of the rating
  // Note: To not get precision errors we need float
  float score = 2;
  // Optional. Severity of the rating, e.g. "high", "medium", "low"
  string severity = 3;
  // Optional. Vector of the rating
  string vector = 4;
  // Optional. Scoring method of the rating
  ScoringMethod method = 5;
}

// Severity is used to provide a score for the vulnerability.
// This message is backwards compatible with the Rating message.
message Severity {
  // Required. Source of the rating
  Source source = 1;
  // Optional. Score of the rating
  // Note: To not get precision errors we need float
  float score = 2;
  // Optional. Severity of the rating, e.g. "high", "medium", "low"
  // Deprecated: Use rating instead
  string severity = 3;
  // Optional. Vector of the rating
  string vector = 4;
  // Optional. Scoring method of the rating
  ScoringMethod method = 5;
  // Required. Severity rating of the rating
  SeverityRating rating = 6;
}

// ScoringMethod is used to identify the scoring method of the rating.
enum ScoringMethod {
  SCOREMETHOD_UNSPECIFIED = 0;
  SCOREMETHOD_CVSSv2 = 1;
  SCOREMETHOD_CVSSv3 = 2;
  SCOREMETHOD_CVSSv4 = 3;
  SCOREMETHOD_EPSS = 4;
  SCOREMETHOD_SSVC = 5;
  // This is the equivalent of the Ubuntu scoring method from OSV:
  // https://ossf.github.io/osv-schema/#severity-field
  SCOREMETHOD_UBUNTU = 6;
}

// Remediation is used to provide a fix for the vulnerability.
message Remediation {
  // The category type of the remediation
  enum Category {
    Unspecified = 0;
    NoFixPlanned = 1;
    NoneAvailable = 2;
    Fix = 3;
    Workaround = 4;
  }
  // The category of the remediation
  Category category = 1;
  // Required. Summary of the remediation
  string summary = 2;
  // Optional. Instruction details of the remediation
  string details = 3;
  // Fix type like 'terraform', 'ansible', 'package'
  string fix_type = 4;
  // Optional. ID of the fix
  string fix_id = 5;
  // Optional. URL to the fix
  string url = 6;
}

// FindingExchange are used for sharing information about findings
// across systems. Mondoo uses this format as a main mean to store detected
// finding information.
message FindingExchange {
  // Required. Unique identifier for this finding.
  string id = 1;

  // Optional. External reference identifier from the original data source.
  // We expect this to be a unique identifier in the original data source.
  string ref = 2;

  // Mondoo Resource Name (MRN). This is read-only and is assigned by Mondoo.
  string mrn = 3;

  // Optional. Result group identifier. Used to group related findings.
  string group_id = 4;

  // Required. Brief summary of the finding (e.g. "SQL Injection in endpoint")
  string summary = 5;

  // Optional. Detailed information about the finding
  FindingDetail details = 6;

  // Required. Timestamp when the finding was first detected
  google.protobuf.Timestamp first_seen_at = 7;
  // Optional. Timestamp when the finding was last seen
  google.protobuf.Timestamp last_seen_at = 8;
  // Optional. Timestamp when the finding was remediated
  google.protobuf.Timestamp remediated_at = 9;

  // Required. Current status of the finding
  Status status = 10;

  // Required. Information about the source that produced this finding
  Source source = 11;

  // Required. List of affected components
  repeated Affects affects = 12;

  // Optional. Technical evidence
  repeated Evidence evidences = 20;

  // Optional. Available remediation options
  repeated Remediation remediations = 21;
}

// Core information about the finding
message FindingDetail {
  enum Category {
    CATEGORY_UNSPECIFIED = 0;
    CATEGORY_SECURITY = 1;
    CATEGORY_VULNERABILITY = 2;
    CATEGORY_ADVISORY = 3;
    CATEGORY_THREAT = 4;
    CATEGORY_MALWARE = 5;
    CATEGORY_INFORMATIONAL = 6;
    CATEGORY_SECRET = 7;
  }

  // Category of the finding
  Category category = 1;

  // Severity of the finding
  Severity severity = 2;

  // How confident the source is in this finding
  Confidence confidence = 3;

  // Detailed description of the finding
  string description = 4;

  // External references (e.g., CVE, CWE, OWASP)
  repeated Reference references = 5;

  // Additional properties specific to this finding type
  map<string, string> properties = 6;
}

// Experimental. Evidence shares details about the facts that lead to the
// finding
message Evidence {
  // Attack tactic used
  AttackTactic tactic = 1;
  // Attack technique used
  AttackTechnique technique = 2;
  // Confidence in the threat
  Confidence confidence = 3;

  // Details about the resource that lead to the finding
  oneof details {
    User user = 20;
    File file = 21;
    Process process = 22;
    Container container = 23;
    Kubernetes kubernetes = 24;
    RegistryKey registry_key = 25;
    Connection connection = 26;
  }
  // Additional properties specific to this evidence
  map<string, string> properties = 4;
}

// Experimental. File information
message File {
  // Absolute path to the file
  string path = 1;
  // File size in bytes
  int64 size = 2;
  // MD5 hash of the file
  string md5 = 3;
  // SHA256 hash of file
  string sha256 = 4;
  // Optional. File content.
  string contents = 20;
}

// Experimental. User information
message User {
  // User ID
  string id = 1;
  // User name
  string name = 2;
  // Additional properties
  map<string, string> properties = 3;
}

// Experimental. Details about the process that lead to the finding
message Process {
  // Process name or command line as displayed in the process list
  string cmdline = 1;
  // Process file information, eg. python binary
  File binary = 2;
  // For scripts, the script file information
  File script = 3;
  // The process ID.
  int64 pid = 5;
  // User
  User user = 6;
  // The parent process.
  Process parent = 8;
}

// Experimental. Details about the container that lead to the finding.
// Only used for containerized environments.
message Container {
  // Container name
  string name = 1;
  // Container image URI (e.g. marketplace.gcr.io/google/ubuntu1804:latest)
  string image_uri = 2;
  // Container image digest
  string digest = 3;
}

// Experimental. Details about Kubernetes resource.
// Only used for Kubernetes environments.
message Kubernetes {
  // Kubernetes pod information
  message Pod {
    // Pod name
    string name = 1;
    // Pod namespace
    string namespace = 2;
    // Container information
    repeated Container containers = 3;
  }

  // Kubernetes node information
  message Node {
    // Node name
    string name = 1;
    // Unique identifier for the node eg. EC2 instance ID
    string id = 2;
  }

  // Affected pods
  repeated Pod pods = 1;
  // Affected nodes
  repeated Node nodes = 2;
}

// Windows Registry Key information
message RegistryKey {
  // Path to the registry key (e.g., "HKLM\\SOFTWARE\\Microsoft\\Windows")
  string path = 1;
  // Name of the value (empty string for default value)
  string name = 2;
  // The actual data
  string data = 3;
}

// Network Connection information
message Connection {
  // Protocol defines the protocol used in the connection. Decimals are
  // equivalent to the protocol numbers assigned by IANA. See
  // https://www.iana.org/assignments/protocol-numbers/protocol-numbers.xhtml
  enum ConnectionProtocol {
    // Unspecified protocol, does not correspond to any real protocol.
    UNSPECIFIED = 0;
    // Internet Control Message Protocol.
    ICMP = 1;
    // Transmission Control Protocol.
    TCP = 6;
    // User Datagram Protocol.
    UDP = 17;
  }

  // Destination address, either hostname or ip.
  string destination_address = 1;
  // Destination port
  int32 destination_port = 2;
  // Optional: Source address, either hostname or ip.
  string source_address = 3;
  // Optional: Source port
  int32 source_port = 4;
  // Protocol used in the connection
  ConnectionProtocol protocol = 5;
}

// AttackTactic is used to identify the tactic used in an attack.
// Typically this refers to identifier on the MITRE ATT&CK framework.
message AttackTactic {
  // Unique identifier for the tactic
  string id = 1;
  // Name of the tactic
  string name = 2;
  // Description of the tactic
  string description = 3;
}

// AttackTechnique is used to identify the technique used in an attack.
// Typically this refers to identifier on the MITRE ATT&CK framework.
message AttackTechnique {
  // Unique identifier for the technique
  string id = 1;
  // Name of the technique
  string name = 2;
  // Description of the technique
  string description = 3;
}

// Confidence levels in finding
enum Confidence {
  CONFIDENCE_UNSPECIFIED = 0;
  CONFIDENCE_LOW = 1;
  CONFIDENCE_MEDIUM = 2;
  CONFIDENCE_HIGH = 3;
}

// SeverityRating is used to identify the severity of a finding.
enum SeverityRating {
  SEVERITY_RATING_UNSPECIFIED = 0;
  // Critical risk severity
  SEVERITY_RATING_CRITICAL = 1;
  // High risk severity
  SEVERITY_RATING_HIGH = 2;
  // Medium risk severity
  SEVERITY_RATING_MEDIUM = 3;
  // Low risk severity
  SEVERITY_RATING_LOW = 4;
  // No risk severity
  SEVERITY_RATING_NONE = 5;
}
